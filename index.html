<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Monitoring SE2026 Kabupaten Klungkung</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
<link href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Base ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  background: #f0f2f5;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  color: #1a1d23;
}

/* ── Topbar ── */
.topbar {
  background: linear-gradient(135deg, #1e293b 0%, #0f4c81 100%);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
  margin-bottom: 24px;
}
.topbar-logo {
  width: 40px; height: 40px;
  background: rgba(255,255,255,.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 700; line-height: 1.2; }
.topbar-sub { font-size: 12px; opacity: .7; margin-top: 1px; }
.topbar-badge {
  margin-left: auto;
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
}

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 14px;
}
.section-header .sh-bar {
  width: 4px; height: 20px;
  border-radius: 4px;
  background: linear-gradient(180deg,#0d6efd,#6610f2);
  flex-shrink: 0;
}
.section-header .sh-title {
  font-size: 14px;
  font-weight: 700;
  color: #1e293b;
  letter-spacing: .01em;
}
.section-header .sh-count {
  margin-left: auto;
  font-size: 11px;
  color: #6c757d;
  background: #e9ecef;
  border-radius: 12px;
  padding: 2px 10px;
}

/* ── Summary cards ── */
.summary-card {
  border: none;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
  transition: transform .15s, box-shadow .15s;
  overflow: hidden;
}
.summary-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
}
.summary-card .card-body { padding: 14px 16px; }
.summary-card .sc-label { font-size: 11px; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.summary-card .sc-val { font-size: 26px; font-weight: 700; line-height: 1; color: #1e293b; }
.summary-card .sc-pct { font-size: 11px; color: #6c757d; margin-top: 2px; }
.summary-card .sc-bar {
  height: 4px;
  border-radius: 2px;
  margin-top: 10px;
  background: #e9ecef;
  overflow: hidden;
}
.summary-card .sc-bar-fill { height: 100%; border-radius: 2px; }
/* accent colors per card index */
.summary-card:nth-child(6n+1) .sc-bar-fill { background: #0d6efd; }
.summary-card:nth-child(6n+2) .sc-bar-fill { background: #6610f2; }
.summary-card:nth-child(6n+3) .sc-bar-fill { background: #0dcaf0; }
.summary-card:nth-child(6n+4) .sc-bar-fill { background: #20c997; }
.summary-card:nth-child(6n+5) .sc-bar-fill { background: #fd7e14; }
.summary-card:nth-child(6n+6) .sc-bar-fill { background: #d63384; }
.summary-card:nth-child(6n+1) .sc-val { color: #0d6efd; }
.summary-card:nth-child(6n+2) .sc-val { color: #6610f2; }
.summary-card:nth-child(6n+3) .sc-val { color: #0dcaf0; }
.summary-card:nth-child(6n+4) .sc-val { color: #20c997; }
.summary-card:nth-child(6n+5) .sc-val { color: #fd7e14; }
.summary-card:nth-child(6n+6) .sc-val { color: #d63384; }

/* ── Panel wrapper ── */
.panel {
  background: #fff;
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 22px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
}

/* ── Filter controls ── */
.filter-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #6c757d;
  margin-bottom: 4px;
  display: block;
}
.form-select, .form-control {
  font-size: 12px !important;
  border-radius: 8px !important;
  border-color: #d1d5db !important;
  padding: 5px 10px !important;
  background-color: #f9fafb !important;
}
.form-select:focus, .form-control:focus {
  border-color: #0d6efd !important;
  box-shadow: 0 0 0 3px rgba(13,110,253,.12) !important;
  background-color: #fff !important;
}

/* ── Pivot table ── */
.pivot-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
.pivot-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
}
.pivot-table thead tr th {
  background: #1e293b;
  color: #e2e8f0;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 9px 12px;
  border: none;
  border-bottom: 2px solid #334155;
  white-space: nowrap;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 2;
}
.pivot-table thead tr th.row-header { text-align: left; min-width: 150px; }
.pivot-table tbody tr:nth-child(odd)  td { background: #fff; }
.pivot-table tbody tr:nth-child(even) td { background: #f8fafc; }
.pivot-table tbody tr:hover td { background: #eff6ff !important; }
.pivot-table tbody td {
  border-bottom: 1px solid #e2e8f0;
  border-right: 1px solid #e2e8f0;
  padding: 7px 12px;
  white-space: nowrap;
  vertical-align: middle;
}
.pivot-table tbody td.row-label {
  text-align: left;
  font-weight: 600;
  color: #334155;
  background: #f1f5f9 !important;
  position: sticky;
  left: 0;
  z-index: 1;
  border-left: 3px solid #0d6efd;
  border-right: 2px solid #cbd5e1;
  min-width: 150px;
  padding-left: 12px;
}
.pivot-cell { text-align: center; }
.pv-val { font-weight: 700; color: #0f172a; font-size: 13px; }
.pv-val.zero { color: #cbd5e1; font-weight: 400; font-size: 12px; }
.pv-pct { font-size: 10px; color: #94a3b8; margin-top: 1px; }
.pv-pct.zero { color: #e2e8f0; }
.pivot-table td.total-col {
  background: #f1f5f9 !important;
  border-left: 2px solid #cbd5e1;
}
.pivot-table th.total-col {
  background: #0f172a !important;
  border-left: 2px solid #334155;
}
.pivot-table tr.total-row td {
  background: #e2e8f0 !important;
  border-top: 2px solid #94a3b8;
  font-weight: 700;
}
.pivot-table tr.total-row td.row-label {
  background: #cbd5e1 !important;
  border-left-color: #64748b;
}
.pivot-status { font-size: 11px; color: #94a3b8; margin-bottom: 10px; }
.pivot-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── DataTable overrides ── */
#tblData_wrapper { font-size: 12px; }
#tblData thead th {
  background: #1e293b !important;
  color: #e2e8f0 !important;
  font-weight: 600 !important;
  font-size: 11px !important;
  text-transform: uppercase !important;
  letter-spacing: .05em !important;
  padding: 9px 12px !important;
  border: none !important;
  border-bottom: 2px solid #334155 !important;
  white-space: nowrap;
}
#tblData thead th.sorting::before,
#tblData thead th.sorting::after,
#tblData thead th.sorting_asc::before,
#tblData thead th.sorting_asc::after,
#tblData thead th.sorting_desc::before,
#tblData thead th.sorting_desc::after {
  color: rgba(255,255,255,.4) !important;
}
/* base cell */
#tblData tbody td {
  padding: 6px 12px !important;
  vertical-align: middle !important;
  font-size: 12px !important;
  font-weight: 400 !important;
  color: #475569 !important;
  border-bottom: 1px solid #e2e8f0 !important;
  border-right: 1px solid #e2e8f0 !important;
  white-space: nowrap;
}
/* col 0 — Assignment: badge-like, bold, accent color */
#tblData tbody td:nth-child(1) {
  font-size: 11px !important;
  font-weight: 700 !important;
  color: #0d6efd !important;
  letter-spacing: .02em;
}
/* col 1 — Nama: primary identifier, bold, dark */
#tblData tbody td:nth-child(2) {
  font-weight: 600 !important;
  color: #0f172a !important;
  font-size: 12px !important;
  min-width: 160px;
  white-space: normal !important;
}
/* col 2 — Alamat: supporting info, regular, slightly muted */
#tblData tbody td:nth-child(3) {
  font-size: 11px !important;
  color: #64748b !important;
  min-width: 140px;
  white-space: normal !important;
}
/* col 3 — SBR: code, monospace */
#tblData tbody td:nth-child(4) {
  font-family: 'Courier New', monospace !important;
  font-size: 11px !important;
  color: #64748b !important;
  text-align: center;
}
/* col 4 — Username: indigo */
#tblData tbody td:nth-child(5) {
  font-size: 11px !important;
  font-weight: 500 !important;
  color: #6366f1 !important;
  letter-spacing: .01em;
}
/* col 5 — User: bold role label */
#tblData tbody td:nth-child(6) {
  font-size: 11px !important;
  font-weight: 700 !important;
  color: #334155 !important;
  text-align: center;
}
/* col 6 — Provinsi: muted, small */
#tblData tbody td:nth-child(7) {
  font-size: 10px !important;
  font-weight: 400 !important;
  color: #94a3b8 !important;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: .04em;
}
/* col 7 — Kabupaten: medium */
#tblData tbody td:nth-child(8) {
  font-size: 11px !important;
  font-weight: 500 !important;
  color: #475569 !important;
}
/* col 8 — Kecamatan: medium */
#tblData tbody td:nth-child(9) {
  font-size: 11px !important;
  font-weight: 500 !important;
  color: #475569 !important;
}
/* col 9 — Desa: slightly bolder */
#tblData tbody td:nth-child(10) {
  font-size: 11px !important;
  font-weight: 600 !important;
  color: #334155 !important;
}
/* col 10 — SLS */
#tblData tbody td:nth-child(11) {
  font-size: 11px !important;
  font-weight: 500 !important;
  color: #475569 !important;
}
/* col 11 — SubSLS: small code */
#tblData tbody td:nth-child(12) {
  font-family: 'Courier New', monospace !important;
  font-size: 11px !important;
  font-weight: 600 !important;
  color: #64748b !important;
  text-align: center;
}
#tblData.table-striped > tbody > tr:nth-of-type(odd) > * {
  --bs-table-accent-bg: transparent;
  background-color: #fff !important;
}
#tblData.table-striped > tbody > tr:nth-of-type(even) > * {
  --bs-table-accent-bg: transparent;
  background-color: #f8fafc !important;
}
#tblData tbody tr:hover > * { background-color: #eff6ff !important; }
#tblData.table-bordered > :not(caption) > * > * { border-color: #e2e8f0 !important; }
.dataTables_wrapper .dataTables_length,
.dataTables_wrapper .dataTables_filter,
.dataTables_wrapper .dataTables_info,
.dataTables_wrapper .dataTables_paginate { font-size: 12px; color: #64748b; }
.dataTables_wrapper .dataTables_filter input { border-radius: 8px !important; border-color: #d1d5db !important; font-size: 12px !important; }
.dataTables_wrapper .page-link { font-size: 12px !important; }
.dt-buttons .btn {
  font-size: 11px !important;
  padding: 4px 12px !important;
  border-radius: 6px !important;
  font-weight: 600 !important;
}
.btn-secondary { background: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #334155 !important; }
.btn-secondary:hover { background: #e2e8f0 !important; }

/* ── Misc ── */
.wrap-panel { border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04); }
.wrap-panel .card { border: none; border-radius: 0; margin: 0; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo">📊</div>
  <div>
    <div class="topbar-title">Dashboard Monitoring SE2026</div>
    <div class="topbar-sub">Kabupaten Klungkung — Provinsi Bali Update 9 Juni 2025 13:00 WITA</div>
    <div class="topbar-sub" style="margin-top:3px; opacity:.85;">
      Ambil link data di :
      <a href="https://drive.google.com/drive/folders/1mPGqB-w-yq-7Z5F7_wy1m0mIOkAN1Xrj?usp=sharing"
         target="_blank"
         style="color:#93c5fd; text-decoration:underline; font-weight:500;">
        Google Drive ↗
      </a>
    </div>
  </div>
  <div class="topbar-badge" id="topbarTotal">Memuat data…</div>
</div>

<div class="container-fluid px-4 pb-4">

  <!-- Assignment Cards -->
  <div class="section-header">
    <div class="sh-bar"></div>
    <div class="sh-title">Assignment</div>
    <div class="sh-count" id="cntAssignment"></div>
  </div>
  <div class="row g-3 mb-4" id="assignmentCards"></div>

  <!-- User Cards -->
  <div class="section-header">
    <div class="sh-bar" style="background:linear-gradient(180deg,#6610f2,#d63384)"></div>
    <div class="sh-title">User</div>
    <div class="sh-count" id="cntUser"></div>
  </div>
  <div class="row g-3 mb-4" id="userCards"></div>

  <!-- Pivot Table -->
  <div class="section-header">
    <div class="sh-bar" style="background:linear-gradient(180deg,#0dcaf0,#20c997)"></div>
    <div class="sh-title">Pivot Tabel</div>
    <div class="sh-count" id="pvStatus"></div>
  </div>
  <div class="panel mb-4">

    <div class="row g-2 mb-3">
      <div class="col-md-auto" style="min-width:140px">
        <label class="filter-label">Baris (Row)</label>
        <select id="pvRowField" class="form-select">
          <option value="Username">Username</option>
          <option value="Kabupaten">Kabupaten</option>
          <option value="Kecamatan">Kecamatan</option>
          <option value="Desa">Desa</option>
          <option value="SLS">SLS</option>
          <option value="SubSLS">SubSLS</option>
        </select>
      </div>
      <div class="col-md-auto" style="min-width:140px">
        <label class="filter-label">Kolom (Column)</label>
        <select id="pvColField" class="form-select">
          <option value="Assignment">Assignment</option>
          <option value="User">User</option>
        </select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Filter Username</label>
        <select id="pvFilterUsername" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Filter User</label>
        <select id="pvFilterUser" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Filter Kabupaten</label>
        <select id="pvFilterKabupaten" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Filter Kecamatan</label>
        <select id="pvFilterKecamatan" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Filter Desa</label>
        <select id="pvFilterDesa" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:110px">
        <label class="filter-label">Filter SLS</label>
        <select id="pvFilterSLS" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:110px">
        <label class="filter-label">Filter SubSLS</label>
        <select id="pvFilterSubSLS" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto d-flex align-items-end">
        <div class="pivot-btn-group">
          <button class="btn btn-primary btn-sm" onclick="renderPivot()">Terapkan</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="resetPivot()">Reset</button>
          <button class="btn btn-outline-success btn-sm" onclick="exportPivotCSV()">↓ CSV</button>
        </div>
      </div>
    </div>

    <div class="pivot-table-wrap">
      <table class="pivot-table" id="pvTable"></table>
    </div>
  </div>

  <!-- Main filter + table -->
  <div class="section-header">
    <div class="sh-bar" style="background:linear-gradient(180deg,#fd7e14,#ffc107)"></div>
    <div class="sh-title">Data Detail</div>
    <div class="sh-count" id="cntDetail"></div>
  </div>
  <div class="panel">
    <div class="row g-2 mb-3">
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Username</label>
        <select id="filterUsername" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">User</label>
        <select id="filterUser" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:145px">
        <label class="filter-label">Assignment</label>
        <select id="filterAssignment" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Kabupaten</label>
        <select id="filterKabupaten" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Kecamatan</label>
        <select id="filterKecamatan" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:130px">
        <label class="filter-label">Desa</label>
        <select id="filterDesa" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:110px">
        <label class="filter-label">SLS</label>
        <select id="filterSLS" class="form-select"><option value="">Semua</option></select>
      </div>
      <div class="col-md-auto" style="min-width:110px">
        <label class="filter-label">SubSLS</label>
        <select id="filterSubSLS" class="form-select"><option value="">Semua</option></select>
      </div>
    </div>

    <div style="overflow-x:auto; border-radius:8px; border:1px solid #e2e8f0;">
      <table id="tblData" class="table table-striped table-bordered w-100" style="margin:0">
        <thead>
          <tr>
            <th>Assignment</th><th>Nama</th><th>Alamat</th><th>SBR</th>
            <th>Username</th><th>User</th><th>Provinsi</th>
            <th>Kabupaten</th><th>Kecamatan</th><th>Desa</th><th>SLS</th><th>SubSLS</th>
          </tr>
        </thead>
      </table>
    </div>
  </div>

</div><!-- /container -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ27Y0FnXR-U2sFBVHtKKspENrnedukpubHql2jJAzs23HSmZrIa6TQHytEqb8jbD-UWo0puQZ-AwSs/pub?output=csv";
let rawData = [], table, allUsers = [];

Papa.parse(CSV_URL, {
  download:true, header:true, skipEmptyLines:true,
  complete(results) {
    rawData = results.data;
    allUsers = [...new Set(rawData.map(x=>x.User).filter(Boolean))].sort();
    document.getElementById("topbarTotal").textContent =
      `${rawData.length.toLocaleString()} record`;
    fillFilters(); buildTable(); fillPivotFilters(); renderPivot();
  }
});

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function unique(f){ return [...new Set(rawData.map(x=>x[f]).filter(Boolean))].sort(); }
function fillSelectEl(el, vals){
  vals.forEach(v=>el.insertAdjacentHTML("beforeend",`<option value="${v}">${v}</option>`));
}
function rebuildSelect(el, field, subset){
  const cur=el.value;
  el.innerHTML=`<option value="">Semua</option>`;
  const vals=[...new Set(subset.map(r=>r[field]).filter(Boolean))].sort();
  fillSelectEl(el,vals);
  el.value=vals.includes(cur)?cur:"";
}

/* ══════════════════════════════════════
   MAIN TABLE — CASCADE FILTERS
══════════════════════════════════════ */
const MAIN_IDS = ["filterUsername","filterUser","filterAssignment",
                  "filterKabupaten","filterKecamatan","filterDesa","filterSLS","filterSubSLS"];

// field mapped to each select id
const MAIN_FIELD = {
  filterUsername:"Username", filterUser:"User", filterAssignment:"Assignment",
  filterKabupaten:"Kabupaten", filterKecamatan:"Kecamatan",
  filterDesa:"Desa", filterSLS:"SLS", filterSubSLS:"SubSLS"
};

function getMainFiltered(excludeId){
  // filter rawData by all main filters EXCEPT excludeId
  return rawData.filter(r=>{
    return MAIN_IDS.every(id=>{
      if(id===excludeId) return true;
      const v=document.getElementById(id).value;
      return !v || r[MAIN_FIELD[id]]===v;
    });
  });
}

function rebuildMainSelect(id){
  // rebuild options for this select based on what the other filters allow
  rebuildSelect(document.getElementById(id), MAIN_FIELD[id], getMainFiltered(id));
}

function onMainFilterChange(){
  // rebuild every OTHER select's options, then redraw table
  MAIN_IDS.forEach(id=>rebuildMainSelect(id));
  if(table) table.draw();
}

function fillFilters(){
  // initial fill — all options from full dataset
  MAIN_IDS.forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML=`<option value="">Semua</option>`;
    fillSelectEl(el, unique(MAIN_FIELD[id]));
  });
}

$.fn.dataTable.ext.search.push(function(s,data){
  // col indices after Skala removed: 0=Assign,1=Nama,2=Alamat,3=SBR,4=Username,5=User,6=Provinsi,7=Kab,8=Kec,9=Desa,10=SLS,11=SubSLS
  const g=id=>document.getElementById(id).value;
  return (!g("filterUsername")||data[4]===g("filterUsername"))
    &&(!g("filterUser")||data[5]===g("filterUser"))
    &&(!g("filterAssignment")||data[0]===g("filterAssignment"))
    &&(!g("filterKabupaten")||data[7]===g("filterKabupaten"))
    &&(!g("filterKecamatan")||data[8]===g("filterKecamatan"))
    &&(!g("filterDesa")||data[9]===g("filterDesa"))
    &&(!g("filterSLS")||data[10]===g("filterSLS"))
    &&(!g("filterSubSLS")||data[11]===g("filterSubSLS"));
});

/* ── Cards ── */
function makeCard(label, jumlah, persen){
  return `<div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
    <div class="card summary-card"><div class="card-body">
      <div class="sc-label">${label}</div>
      <div class="sc-val">${jumlah.toLocaleString()}</div>
      <div class="sc-pct">${persen}% dari total</div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${persen}%"></div></div>
    </div></div>
  </div>`;
}
function updateAssignmentCards(data){
  const el=document.getElementById("assignmentCards"), total=data.length, s={};
  data.forEach(r=>{ const k=r.Assignment||"Tidak Ada"; s[k]=(s[k]||0)+1; });
  el.innerHTML="";
  Object.entries(s).sort((a,b)=>b[1]-a[1]).forEach(([k,n])=>{
    el.insertAdjacentHTML("beforeend", makeCard(k,n,total>0?((n/total)*100).toFixed(1):0));
  });
  document.getElementById("cntAssignment").textContent=`${Object.keys(s).length} tipe`;
}
function updateUserCards(data){
  const el=document.getElementById("userCards"), total=data.length, s={};
  data.forEach(r=>{ const k=r.User||"Tidak Ada"; s[k]=(s[k]||0)+1; });
  el.innerHTML="";
  allUsers.forEach(u=>{
    const n=s[u]||0;
    el.insertAdjacentHTML("beforeend", makeCard(u,n,total>0?((n/total)*100).toFixed(1):0));
  });
  document.getElementById("cntUser").textContent=`${allUsers.length} user`;
}

/* ── DataTable ── */
function buildTable(){
  table=$('#tblData').DataTable({
    data:rawData, responsive:true, pageLength:25, dom:'Bfrtip',
    buttons:['excel','csv','pdf','print'],
    columns:[
      {data:'Assignment'},{data:'Nama'},{data:'Alamat'},{data:'SBR'},
      {data:'Username'},{data:'User'},{data:'Provinsi'},
      {data:'Kabupaten'},{data:'Kecamatan'},{data:'Desa'},{data:'SLS'},{data:'SubSLS'}
    ]
  });
  table.on('draw',function(){
    const f=table.rows({search:'applied'}).data().toArray();
    updateAssignmentCards(f); updateUserCards(f);
    document.getElementById("cntDetail").textContent=`${f.length.toLocaleString()} record`;
  });
  updateAssignmentCards(rawData); updateUserCards(rawData);
  document.getElementById("cntDetail").textContent=`${rawData.length.toLocaleString()} record`;
}

MAIN_IDS.forEach(id=>{
  document.getElementById(id).addEventListener("change", onMainFilterChange);
});

/* ══════════════════════════════════════
   PIVOT — CASCADE FILTERS
══════════════════════════════════════ */
const PV_IDS = ["pvFilterUser","pvFilterUsername","pvFilterKabupaten",
                "pvFilterKecamatan","pvFilterDesa","pvFilterSLS","pvFilterSubSLS"];
const PV_FIELD = {
  pvFilterUser:"User", pvFilterUsername:"Username", pvFilterKabupaten:"Kabupaten",
  pvFilterKecamatan:"Kecamatan", pvFilterDesa:"Desa", pvFilterSLS:"SLS", pvFilterSubSLS:"SubSLS"
};

function getPvFiltered(excludeId){
  return rawData.filter(r=>{
    return PV_IDS.every(id=>{
      if(id===excludeId) return true;
      const v=document.getElementById(id).value;
      return !v || r[PV_FIELD[id]]===v;
    });
  });
}

function rebuildPvSelect(id){
  rebuildSelect(document.getElementById(id), PV_FIELD[id], getPvFiltered(id));
}

function onPvFilterChange(){
  PV_IDS.forEach(id=>rebuildPvSelect(id));
}

function fillPivotFilters(){
  PV_IDS.forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML=`<option value="">Semua</option>`;
    fillSelectEl(el, unique(PV_FIELD[id]));
    el.addEventListener("change", onPvFilterChange);
  });
}

function getPivotData(){
  return rawData.filter(r=>{
    return PV_IDS.every(id=>{
      const v=document.getElementById(id).value;
      return !v || r[PV_FIELD[id]]===v;
    });
  });
}

let lastPivotResult=null;
function renderPivot(){
  const rowField=document.getElementById("pvRowField").value;
  const colField=document.getElementById("pvColField").value;
  const data=getPivotData();
  const rowKeys=[...new Set(data.map(r=>r[rowField]||"(Kosong)"))].sort();
  const colKeys=[...new Set(data.map(r=>r[colField]||"(Kosong)"))].sort();
  const count={}, rowTotal={}, colTotal={}; let grand=0;
  rowKeys.forEach(r=>{count[r]={};rowTotal[r]=0;});
  colKeys.forEach(c=>{colTotal[c]=0;});
  data.forEach(row=>{
    const r=row[rowField]||"(Kosong)", c=row[colField]||"(Kosong)";
    count[r][c]=(count[r][c]||0)+1; rowTotal[r]++; colTotal[c]++; grand++;
  });
  lastPivotResult={rowField,colField,rowKeys,colKeys,count,rowTotal,colTotal,grand};

  let html="<thead><tr>";
  html+=`<th class="row-header">${rowField}</th>`;
  colKeys.forEach(c=>{html+=`<th>${c}</th>`;});
  html+=`<th class="total-col">Total</th></tr></thead><tbody>`;
  rowKeys.forEach(r=>{
    const rt=rowTotal[r]||0;
    html+=`<tr><td class="row-label">${r}</td>`;
    colKeys.forEach(c=>{
      const val=count[r][c]||0, iz=val===0;
      const pct=rt>0?((val/rt)*100).toFixed(1):"0.0";
      html+=`<td><div class="pivot-cell">
        <div class="pv-val${iz?" zero":""}">${iz?"–":val.toLocaleString()}</div>
        <div class="pv-pct${iz?" zero":""}">${iz?"":pct+"%"}</div>
      </div></td>`;
    });
    html+=`<td class="total-col"><div class="pivot-cell"><div class="pv-val">${rt.toLocaleString()}</div><div class="pv-pct">100%</div></div></td></tr>`;
  });
  html+=`<tr class="total-row"><td class="row-label">Total</td>`;
  colKeys.forEach(c=>{
    const val=colTotal[c]||0;
    const pct=grand>0?((val/grand)*100).toFixed(1):"0.0";
    html+=`<td><div class="pivot-cell"><div class="pv-val">${val.toLocaleString()}</div><div class="pv-pct">${pct}%</div></div></td>`;
  });
  html+=`<td class="total-col"><div class="pivot-cell"><div class="pv-val">${grand.toLocaleString()}</div><div class="pv-pct">100%</div></div></td></tr></tbody>`;
  document.getElementById("pvTable").innerHTML=html;
  document.getElementById("pvStatus").textContent=
    `${rowKeys.length} baris × ${colKeys.length} kolom | ${grand.toLocaleString()} record`;
}

function resetPivot(){
  PV_IDS.forEach(id=>{ document.getElementById(id).value=""; });
  PV_IDS.forEach(id=>{
    const el=document.getElementById(id);
    el.innerHTML=`<option value="">Semua</option>`;
    fillSelectEl(el, unique(PV_FIELD[id]));
  });
  renderPivot();
}

function exportPivotCSV(){
  if(!lastPivotResult)return;
  const{rowField,colField,rowKeys,colKeys,count,rowTotal,colTotal,grand}=lastPivotResult;
  const rows=[[rowField,...colKeys.flatMap(c=>[c,c+"_%"]),"Total","Total_%"].join(",")];
  rowKeys.forEach(r=>{
    const rt=rowTotal[r]||0;
    rows.push([`"${r}"`,...colKeys.flatMap(c=>{const v=count[r][c]||0;return[v,rt>0?((v/rt)*100).toFixed(1)+"%":"0%"];}),rt,"100%"].join(","));
  });
  rows.push(["Total",...colKeys.flatMap(c=>{const v=colTotal[c]||0;return[v,grand>0?((v/grand)*100).toFixed(1)+"%":"0%"];}),grand,"100%"].join(","));
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv;charset=utf-8;"}));
  a.download=`pivot_${rowField}_x_${colField}.csv`; a.click();
}
